dist: trusty

sudo: required

language: go

go:
  - "1.16.x"

env:
  - DB=mysql:5.6
  - DB=mysql:5.7
  - DB=mysql:8.0

services:
  - docker

script:
  - test -d /home/travis/gopath/src/github.com/terraform-providers || mv $(dirname $PWD) /home/travis/gopath/src/github.com/terraform-providers
  - sudo service mysql stop
  - ./testall.sh

matrix:
  fast_finish: true
  allow_failures:
    - go: tip
